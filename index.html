<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />

  <title>YVML Map</title>


  <!-- Open Graph Tags -->
  <meta property="og:title" content="YVML Interactive Map" />
  <meta property="og:description" content="An interactive map for the YVML site" />
  <meta property="og:image" content="https://gh.yvml.org/map/images/open-graph/open-graph-4.jpg" />
  <meta property="og:url" content="https://gh.yvml.org/map" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="YVML" />


  <!-- Twitter tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="YVML Interactive Map" />
  <meta name="twitter:description" content="An interactive map for the YVML site" />
  <meta name="twitter:image" content="https://gh.yvml.org/map/images/open-graph/open-graph-4.jpg" />

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>
  <!--- START Navbar -->
  <div id="navbar">
    <div></div>
    <img src="./images/logo/title.png" />
    <button id="navbar-settings">❇︎</button>
  </div>
  <!--- END Navbar -->

  <div id="map"></div>

  <button id="locate-button">✣</button>

  <!-- START Settings Pane -->
  <div id="settings-pane" class="hidden">
    <div class="flex flex-col gap-4">
      <h3><b>Settings</b></h3>
      <p>
        the source code is available at <a href="https://github.com/yvml/map">github.com/yvml/map</a>
      </p>
      <p>this website collects no data on your behalf</p>


      <div id="settings-feature-flags">
        <div id="settings-feature-flags-list" class="settings-feature-flag-container flex flex-col gap-2">
        </div>
      </div>

      <button id="settings-pane-clear-local-storage">Clear Local Storage</button>

      <button id="settings-pane-close">Close</button>
    </div>
  </div>
  <!-- END Settings Pane -->

  <!---- START POI Popup -->
  <div id="poi-popup" class="hidden">
    <div class="flex flex-col poi-popup-content">
      <div class="flex place-content-between items-center poi-popup-header">
        <div id="poi-popup-title"></div>
        <button id="poi-popup-close" class="popup-icon-button">
          x
        </button>
      </div>
      <img id="poi-popup-image" />
      <div id="poi-popup-audio" class="hidden">
        <div id="poi-popup-audio-player">
          <button id="poi-popup-audio-back" type="button" aria-label="Go back 15 seconds">-15</button>
          <button id="poi-popup-audio-toggle" type="button" aria-label="Play audio">▶︎</button>
          <button id="poi-popup-audio-forward" type="button" aria-label="Go forward 15 seconds">+15</button>
          <div id="poi-popup-audio-progress-track" aria-hidden="true">
            <div id="poi-popup-audio-progress"></div>
          </div>
          <div id="poi-popup-audio-time">--:--</div>
        </div>
        <audio id="poi-popup-audio-media" preload="none"></audio>
      </div>
    </div>
  </div>
  <!---- END POI Popup -->

  <!-- START console -->
  <div id="console">
  </div>
  <!-- END console -->


  <!-- Vite will inject compiled JS here -->
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
