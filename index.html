<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title>YVML Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>
  <!--- START Navbar -->
  <div id="navbar">
    <img src="./images/logo.png" />
    <span>YVML Map</span>
    <button id="navbar-settings">❇</button>
  </div>
  <!--- END Navbar -->

  <div id="map"></div>

  <!-- START Settings Pane -->
  <div id="settings-pane" class="hidden">
    <div class="flex flex-col gap-4">
      <h3>Settings</h3>
      <p>
        This site collects no data on your behalf. Everything is stored on your device.


        the source code is available here: <a href="https://github.com/johngarrett/yvml-interactive-map">Github</a>
        (TODO: move to YVML github)
      </p>

      <div id="settings-feature-flags">
        <h4>Feature Flags</h4>
        <div id="settings-feature-flags-list">
        </div>
      </div>

      <button id="settings-pane-clear-local-storage">Clear Local Storage</button>

      <button id="settings-pane-close">Close</button>
    </div>
  </div>
  <!-- END Settings Pane -->

  <!---- START POI Popup -->
  <div id="poi-popup" class="hidden">
    <div class="flex flex-col p-4">
      <div class="flex place-content-between items-start">
        <img id="poi-popup-image" />
        <div id="poi-popup-title"></div>
        <button id="poi-popup-close"
          class="font-bold hover:bg-gray-100 hover:text-gray-600 focus:outline-none focus:ring-2 focus:ring-gray-500">
          x
        </button>
      </div>
      <audio id="poi-popup-audio-element" controls preload="none"></audio>
    </div>
  </div>
  <!---- END POI Popup -->

  <!-- START console -->
  <div id="console">
  </div>
  <!-- END console -->

  <!-- Vite will inject compiled JS here -->
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
